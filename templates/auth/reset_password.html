{% extends "layout.html" %}
{% block content %}

<main class="auth-container">
  <div class="login-card reset-card">
    <div class="auth-logo-box">🛡️</div>
    <h2>Reset Password</h2>
    <p class="auth-subtitle">Please enter your new password below to secure your account.</p>

    <form method="POST" class="auth-form">
      <div class="input-group">
        <input type="password" name="password" placeholder="New Password" required>
      </div>
      
      <button type="submit" class="btn-primary btn-block">Update Password</button>
      
      <p class="auth-footer-text">
        <a href="/login">Cancel and return to login</a>
      </p>
    </form>
  </div>
</main>

{% endblock %}
