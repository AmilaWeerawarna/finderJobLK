<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employer Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_style.css') }}">
</head>
<body class="dark-theme">

    <div class="dashboard-container">
        <aside class="sidebar sub-sidebar">
            <h2 class="logo">FinderJobLK</h2>
            <nav class="menu">
                <a href="/admin/manage_employers/pending" class="active">Pending Verify</a>
                <a href="/admin/manage_employers/verified">Verified Employers</a>
                <a href="/admin/manage_employers/rejected">Rejected Employers</a>
            </nav>
            <div class="sidebar-bottom">
                <a href="/logout">🚪 Log Out</a>
            </div>
        </aside>

        <main class="content">
            <header class="back-header">
                <a href="/admin/manage_employers/pending" class="back-btn">←</a>
                <h2>Manage Employers</h2>
            </header>

            <section class="employer-detail-card">
                <div class="detail-top-row">
                    <div class="detail-logo-box">
                        {% if employer.profile_image and employer.profile_image != 'default_user.png' %}
                            <img src="{{ url_for('static', filename='profile_img/' + employer.profile_image) }}" alt="Logo">
                        {% else %}
                            <span>Logo</span>
                        {% endif %}
                    </div>
                    <div class="detail-top-inputs">
                        <div class="input-group">
                            <input type="text" value="{{ employer.get('name', '') }}" readonly placeholder="Full Name">
                        </div>
                        <div class="input-group">
                            <input type="text" value="{{ employer.get('email', '') }}" readonly placeholder="Email">
                        </div>
                    </div>
                </div>

                <div class="input-group full-width">
                    <input type="text" value="{{ employer.get('company_name', '') }}" readonly placeholder="Company Name">
                </div>

                <div class="detail-two-cols">
                    <div class="input-group">
                        <input type="text" value="{{ employer.get('phone', '') }}" readonly placeholder="Phone Number">
                    </div>
                    <div class="input-group">
                        <input type="text" value="{{ employer.get('city', '') }}" readonly placeholder="City">
                    </div>
                </div>

                <div class="input-group full-width website-input">
                    <input type="text" value="{{ employer.get('website', '') }}" readonly placeholder="Company Web Site URL">
                    <span class="link-icon">🔗</span>
                </div>

                <form action="/admin/manage_employers/action" method="POST" class="detail-actions">
                    <input type="hidden" name="employer_id" value="{{ employer._id }}">
                    <button type="submit" name="action" value="reject" class="btn-reject">Reject</button>
                    <button type="submit" name="action" value="verify" class="btn-verify">Verify</button>
                </form>
            </section>
        </main>
    </div>

</body>
</html>
